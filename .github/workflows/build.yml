name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --ignore-scripts

      - run: npm test

  auto-tag:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version and create tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "Detected version: ${VERSION}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping"
            echo "new_tag=" >> $GITHUB_OUTPUT
          else
            echo "Creating tag ${TAG}"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "new_tag=${TAG}" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: auto-tag
    runs-on: windows-latest
    if: always() && (needs.auto-tag.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --ignore-scripts

      - name: Build renderer
        run: npm run build:renderer --workspace=@uspto-search/desktop

      - name: Prepare desktop node_modules for packaging
        shell: bash
        run: |
          # electron-builder needs node_modules in the project dir
          # Copy hoisted deps to packages/desktop/ so they're included in the ASAR
          cp -r node_modules packages/desktop/node_modules

      - name: Build installer and publish to GitHub Release
        working-directory: packages/desktop
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packages/desktop/dist/installer/*.exe
