name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

  auto-tag:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version and create tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "Detected version: ${VERSION}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping"
            echo "new_tag=" >> $GITHUB_OUTPUT
          else
            echo "Creating tag ${TAG}"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "new_tag=${TAG}" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: auto-tag
    runs-on: windows-latest
    if: always() && (needs.auto-tag.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: needs.auto-tag.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ needs.auto-tag.outputs.new_tag || github.ref_name }}
          files: dist/installer/*.exe
