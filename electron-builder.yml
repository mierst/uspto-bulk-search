appId: com.usptotools.bulk-search
productName: USPTO Bulk Search
directories:
  output: dist/installer
files:
  - src/main/**/*
  - dist/renderer/**/*
  - node_modules/**/*
win:
  target: nsis
  icon: resources/icon.png
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
